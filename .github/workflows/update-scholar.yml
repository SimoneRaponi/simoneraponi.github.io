name: Update Scholar Stats

on:
  schedule:
    - cron: '0 7 * * *'   # Every day at 07:00 UTC
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-scholar.yml'   # Run once on first deploy
  workflow_dispatch:        # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y tor
          sudo service tor start
          # Wait for Tor to bootstrap
          sleep 20

      - name: Install scholarly
        run: pip install scholarly PySocks

      - name: Fetch Scholar stats
        shell: python3 {0}
        run: |
          import json, os, sys, time, socks, socket
          from datetime import date
          from scholarly import scholarly

          # Patch the default socket to route all connections through Tor SOCKS5
          # (bypasses scholarly's proxy system entirely)
          socks.set_default_proxy(socks.SOCKS5, "127.0.0.1", 9050)
          socket.socket = socks.socksocket

          author = None
          for attempt in range(3):
              try:
                  author = scholarly.search_author_id('IgaW2DoAAAAJ')
                  scholarly.fill(author, sections=['indices'])
                  break
              except Exception as exc:
                  print(f'Attempt {attempt + 1} failed: {exc}', file=sys.stderr)
                  if attempt < 2:
                      time.sleep(30)

          if author is None:
              print('All attempts failed', file=sys.stderr)
              sys.exit(1)

          data = {
              'citations': author.get('citedby', 0),
              'hindex':    author.get('hindex', 0),
              'updated':   date.today().isoformat(),
          }

          os.makedirs('data', exist_ok=True)
          with open('data/scholar.json', 'w') as fh:
              json.dump(data, fh, indent=2)
              fh.write('\n')

          print(f"citations={data['citations']}, hindex={data['hindex']}")

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scholar.json
          git diff --cached --quiet || git commit -m "chore: update Scholar stats [skip ci]"
          git push
