name: Update Scholar Stats

on:
  schedule:
    - cron: '0 7 * * *'   # Every day at 07:00 UTC
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-scholar.yml'   # Run once on first deploy
  workflow_dispatch:        # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y tor privoxy
          # Forward Privoxy → Tor SOCKS5
          echo 'forward-socks5 / 127.0.0.1:9050 .' | sudo tee -a /etc/privoxy/config
          sudo service tor start
          sudo service privoxy start
          # Wait for Tor to bootstrap
          sleep 20

      - name: Install scholarly
        run: pip install scholarly

      - name: Fetch Scholar stats
        shell: python3 {0}
        run: |
          import json, os, sys, time
          from datetime import date
          from scholarly import scholarly, ProxyGenerator

          # Route scholarly through Privoxy → Tor
          pg = ProxyGenerator()
          pg.SingleProxy(http='http://127.0.0.1:8118', https='http://127.0.0.1:8118')
          scholarly.use_proxy(pg)

          author = None
          for attempt in range(3):
              try:
                  author = scholarly.search_author_id('IgaW2DoAAAAJ')
                  scholarly.fill(author, sections=['basics'])
                  break
              except Exception as exc:
                  print(f'Attempt {attempt + 1} failed: {exc}', file=sys.stderr)
                  if attempt < 2:
                      time.sleep(30)

          if author is None:
              print('All attempts failed', file=sys.stderr)
              sys.exit(1)

          data = {
              'citations': author.get('citedby', 0),
              'hindex':    author.get('hindex', 0),
              'updated':   date.today().isoformat(),
          }

          os.makedirs('data', exist_ok=True)
          with open('data/scholar.json', 'w') as fh:
              json.dump(data, fh, indent=2)
              fh.write('\n')

          print(f"citations={data['citations']}, hindex={data['hindex']}")

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scholar.json
          git diff --cached --quiet || git commit -m "chore: update Scholar stats [skip ci]"
          git push
