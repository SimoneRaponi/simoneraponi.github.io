name: Update GitHub Stars

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 08:00 UTC
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-github-stars.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub repo stats
        shell: python3 {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          import json, os, urllib.request
          from datetime import date

          url = 'https://api.github.com/repos/illustrated-machine-learning/illustrated-machine-learning.github.io'
          req = urllib.request.Request(url, headers={
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'Accept':        'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          })
          with urllib.request.urlopen(req) as r:
              repo = json.loads(r.read())

          data = {
              'stars':   repo['stargazers_count'],
              'forks':   repo['forks_count'],
              'updated': date.today().isoformat(),
          }

          os.makedirs('data', exist_ok=True)
          with open('data/github-stars.json', 'w') as fh:
              json.dump(data, fh, indent=2)
              fh.write('\n')

          print(f"stars={data['stars']}, forks={data['forks']}")

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github-stars.json
          git diff --cached --quiet || git commit -m "chore: update GitHub stars [skip ci]"
          git push
